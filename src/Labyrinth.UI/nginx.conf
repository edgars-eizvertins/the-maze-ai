server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM SPA fallback
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Reverse-proxy the game API (same-origin → no CORS needed)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /health {
        proxy_pass http://api:8080;
    }

    # Correct MIME types / compression for the WASM payload
    location ~ \.(wasm)$  { types { application/wasm wasm; } default_type application/wasm; }
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm application/octet-stream;
    gzip_min_length 1024;
}
